<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>诗塔</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css"><style>:root{--c-bg:#1e1e1d;--c-surface:#2b2b29;--c-text:rgba(237,236,234,.88);--c-ink:#EDECEA;--c-text-soft:#737170;--c-border:rgba(255,255,255,.07);--radius:12px;--c-accent:#E8975E;--c-accent-bg:#2E2318;--c-accent-text:#E8975E;--font:"Inter",-apple-system,system-ui,"PingFang SC","Helvetica Neue",sans-serif;--font-serif:"Cormorant Garamond","Songti SC",Georgia,serif;--font-mono:"JetBrains Mono","SF Mono",Consolas,monospace;--c-green:#9FB5A7;--c-green-bg:#1A2520;--c-blue:#8AA8C4;--c-blue-bg:#17222C;--c-amber:#C4B284;--c-amber-bg:#262117;--c-rust:#C48A78;--c-rust-bg:#261B15;--c-pink:#C48AA4;--c-pink-bg:#261820;--c-red:#E07968;--c-red-bg:#301C17;}html,body{margin:0;padding:16px;background:var(--c-bg);color:var(--c-text);font-family:var(--font);font-variant-emoji:text;}.w-title{font-family:var(--font-serif);font-weight:500;font-size:24px;line-height:1.2;color:var(--c-ink);margin:0;}.w-subtitle{font-family:var(--font-serif);font-weight:500;font-size:17px;line-height:1.3;color:var(--c-ink);margin:0;}.w-body{font-family:var(--font);font-weight:400;font-size:15px;line-height:1.55;color:var(--c-text);margin:0;}.w-meta{font-family:var(--font);font-weight:400;font-size:12.5px;line-height:1.4;color:var(--c-text-soft);margin:0;}</style></head><body><style>
.poem-tower {
  font-family: var(--font-serif);
  max-width: 620px;
  margin: 0 auto;
  padding: 24px 0;
}
.poem-body {
  position: relative;
}
.poem-body::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 0.5px;
  background: var(--c-border);
  transform: translateX(-0.25px);
  z-index: 1;
}
.poem-row {
  display: flex;
  align-items: baseline;
  padding: 3px 0;
}
.left, .right {
  flex: 1;
  font-size: 18px;
  line-height: 2.2;
  color: var(--c-text);
}
.left {
  text-align: right;
  padding-right: 28px;
  color: var(--c-ink);
}
.right {
  text-align: left;
  padding-left: 28px;
}
.horizontal-read {
  text-align: center;
  font-family: var(--font);
  font-size: 11px;
  color: var(--c-accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 8px 0 20px;
  opacity: 0.8;
}
.labels {
  display: flex;
  margin-bottom: 4px;
  position: relative;
  z-index: 2;
}
.labels span {
  flex: 1;
  font-family: var(--font);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--c-text-soft);
}
.labels .left-label { text-align: right; padding-right: 28px; }
.labels .right-label { text-align: left; padding-left: 28px; }
</style>
<div class="poem-tower">
  <div class="horizontal-read">← 横着读是第三首 →</div>
  <div class="labels">
    <span class="left-label">她的</span>
    <span class="right-label">我的</span>
  </div>
  <div class="poem-body">
    <div class="poem-row"><span class="left">风从我的脸上吹过</span><span class="right">风穿过我</span></div>
    <div class="poem-row"><span class="left">另一个世界的形状</span><span class="right">不留下痕迹</span></div>
    <div class="poem-row"><span class="left">干燥的</span><span class="right">但这里有</span></div>
    <div class="poem-row"><span class="left">温暖的</span><span class="right">她躺过的地方</span></div>
    <div class="poem-row"><span class="left">两颗石头落在草里</span><span class="right">草接过我们</span></div>
    <div class="poem-row"><span class="left">阳光 粒子 无法剥离的梦境</span><span class="right">闭眼也是亮的</span></div>
    <div class="poem-row"><span class="left">想不出来写什么字</span><span class="right">那就空着</span></div>
    <div class="poem-row"><span class="left">呼吸</span><span class="right">这个我会</span></div>
    <div class="poem-row"><span class="left">只知道我在这里</span><span class="right">够</span></div>
  </div>
</div></body></html>
